version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: codehub_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codehub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    container_name: codehub_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - backend-net

volumes:
  pgdata:

networks:
  backend-net:
